# yaml-language-server: $schema=../../../../../../schema.json
design:
  theme: minimal
  page:
    top_margin: 0.9in
    bottom_margin: 0.9in
    left_margin: 0.9in
    right_margin: 0.9in
    show_footer: false
    show_top_note: false
  typography:
    line_spacing: 0.7em
    alignment: left
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
      name: 28pt
      headline: 10.5pt
      connections: 9pt
      section_titles: 1.2em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  colors:
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  header:
    alignment: left
    space_below_name: 0.8cm
    space_below_headline: 0.3cm
    space_below_connections: 0.8cm
    connections:
      separator: "·"
      show_icons: false
      display_urls_instead_of_usernames: true
      space_between_connections: 0.4cm
  links:
    underline: false
    show_external_link_icon: false
  section_titles:
    type: without_line
    space_above: 0.7cm
    space_below: 0.25cm
  sections:
    space_between_regular_entries: 1.5em
    space_between_text_based_entries: 0.4em
    show_time_spans_in: []
  entries:
    short_second_row: false
    side_space: 0cm
    space_between_columns: 0.3cm
    date_and_location_width: 4cm
    summary:
      space_above: 0.1cm
      space_left: 0cm
    highlights:
      bullet: "—"
      nested_bullet: "—"
      space_left: 0.3cm
      space_above: 0.12cm
      space_between_items: 0.1cm
      space_between_bullet_and_text: 0.5em
  templates:
    education_entry:
      main_column: "**INSTITUTION**\n*DEGREE_WITH_AREA*\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: "LOCATION\nDATE"
      degree_column: null
    normal_entry:
      main_column: "**NAME**\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: "LOCATION\nDATE"
    experience_entry:
      main_column: "**POSITION**, *COMPANY*\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: "LOCATION\nDATE"
