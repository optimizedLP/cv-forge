# yaml-language-server: $schema=../../../../../../schema.json
design:
  theme: academic
  page:
    top_margin: 0.55in
    bottom_margin: 0.55in
    left_margin: 0.65in
    right_margin: 0.65in
    show_footer: true
    show_top_note: false
  typography:
    line_spacing: 0.5em
    alignment: justified
    font_family:
      body: EB Garamond
      name: EB Garamond
      headline: EB Garamond
      connections: EB Garamond
      section_titles: EB Garamond
    font_size:
      body: 10pt
      name: 24pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.2em
    small_caps:
      name: true
      headline: false
      connections: false
      section_titles: true
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  colors:
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  header:
    alignment: center
    space_below_name: 0.4cm
    space_below_headline: 0.2cm
    space_below_connections: 0.4cm
    connections:
      separator: "·"
      show_icons: false
      display_urls_instead_of_usernames: true
      space_between_connections: 0.35cm
  links:
    underline: false
    show_external_link_icon: false
  section_titles:
    type: centered_with_full_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.2cm
  sections:
    space_between_regular_entries: 0.9em
    space_between_text_based_entries: 0.2em
    show_time_spans_in: []
  entries:
    short_second_row: false
    side_space: 0cm
    space_between_columns: 0.15cm
    date_and_location_width: 3.5cm
    degree_width: 1.2cm
    summary:
      space_above: 0.05cm
      space_left: 0cm
    highlights:
      bullet: "•"
      nested_bullet: "◦"
      space_left: 0.15cm
      space_above: 0.05cm
      space_between_items: 0.03cm
      space_between_bullet_and_text: 0.4em
  templates:
    footer: "*NAME · PAGE_NUMBER/TOTAL_PAGES*"
    education_entry:
      main_column: "**INSTITUTION**\nDEGREE_WITH_AREA — LOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
      degree_column: "**DEGREE**"
    normal_entry:
      main_column: "**NAME** — LOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
    experience_entry:
      main_column: "**POSITION**, COMPANY — LOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
    publication_entry:
      main_column: "**TITLE**\nAUTHORS\n*JOURNAL*, DATE\nSUMMARY"
      date_and_location_column: DATE
