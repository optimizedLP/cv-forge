# yaml-language-server: $schema=../../../../../../schema.json
design:
  theme: executive
  page:
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.75in
    right_margin: 0.75in
    show_footer: true
    show_top_note: false
  typography:
    line_spacing: 0.6em
    alignment: justified-with-no-hyphenation
    font_family:
      body: Source Sans 3
      name: EB Garamond
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: EB Garamond
    font_size:
      body: 10pt
      name: 34pt
      headline: 11pt
      connections: 9pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: false
  colors:
    body: rgb(30, 30, 40)
    name: rgb(15, 30, 60)
    headline: rgb(90, 100, 120)
    connections: rgb(110, 120, 140)
    section_titles: rgb(15, 30, 60)
    links: rgb(15, 30, 60)
    footer: rgb(140, 145, 155)
    top_note: rgb(140, 145, 155)
  header:
    alignment: center
    photo_width: 4cm
    photo_position: left
    space_below_name: 0.7cm
    space_below_headline: 0.4cm
    space_below_connections: 0.6cm
    connections:
      separator: ""
      show_icons: true
      display_urls_instead_of_usernames: false
      space_between_connections: 0.5cm
  links:
    underline: false
    show_external_link_icon: false
  section_titles:
    type: centered_with_partial_line
    line_thickness: 0.6pt
    space_above: 0.6cm
    space_below: 0.3cm
  sections:
    space_between_regular_entries: 1.3em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    short_second_row: false
    side_space: 0.15cm
    space_between_columns: 0.2cm
    date_and_location_width: 4.2cm
    summary:
      space_above: 0.1cm
      space_left: 0cm
    highlights:
      bullet: "▹"
      nested_bullet: "◦"
      space_left: 0.2cm
      space_above: 0.1cm
      space_between_items: 0.08cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: "*NAME · PAGE_NUMBER/TOTAL_PAGES*"
    education_entry:
      main_column: "**INSTITUTION**\nDEGREE_WITH_AREA — LOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
      degree_column: null
    normal_entry:
      main_column: "**NAME**\nLOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
    experience_entry:
      main_column: "**POSITION**\n*COMPANY* — LOCATION\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
